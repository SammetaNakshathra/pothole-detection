<!DOCTYPE html>
<html>
<head>
    <title>ShockMap - Pothole Detection</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; }
        #map { height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
var map = L.map('map').setView([17.3850, 78.4867], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

function getColor(severity) {
    if (severity >= 5) return 'red';
    else if (severity >= 3) return 'orange';
    else return 'green';
}

let markersLayer = L.layerGroup().addTo(map);

function loadPotholes() {
    markersLayer.clearLayers();

    fetch('http://127.0.0.1:5000/api/potholes')
        .then(res => res.json())
        .then(data => {
            data.forEach(p => {
                L.circleMarker([p.latitude, p.longitude], {
                    color: getColor(p.severity),
                    fillOpacity: 0.8,
                    radius: 8
                })
                .bindPopup(`Severity: ${p.severity}`)
                .addTo(markersLayer);
            });
        });
}

loadPotholes();
setInterval(loadPotholes, 5000);
</script>
    
</body>
</html>
